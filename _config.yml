# NOTE: This file is auto-synced from config/settings.yaml.
# Edit config/settings.yaml → the pipeline will update this file automatically.

title: "Dexterous Grasp Daily Research"
description: >-
  Daily arXiv paper tracking with AI summaries and podcasts
url: "https://solitary2005.github.io"
baseurl: "/research_pipeline"
markdown: kramdown

collections:
  papers:
    output: true
    permalink: /papers/:name/
  podcasts:
    output: true
    permalink: /podcasts/:name/

defaults:
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "paper"
  - scope:
      path: ""
      type: "podcasts"
    values:
      layout: "podcast"
