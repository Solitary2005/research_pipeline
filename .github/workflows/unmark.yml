name: Process Unmark Request

on:
  issues:
    types: [labeled]

jobs:
  process:
    if: github.event.label.name == 'unmark-request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse arxiv_id from issue
        id: parse
        run: |
          ARXIV_ID=$(echo "${{ github.event.issue.title }}" | grep -oP '\d{4}\.\d{4,5}' | head -1)
          if [ -z "$ARXIV_ID" ]; then
            ARXIV_ID=$(echo "${{ github.event.issue.body }}" | grep -oP '\d{4}\.\d{4,5}' | head -1)
          fi
          echo "arxiv_id=$ARXIV_ID" >> "$GITHUB_OUTPUT"
          echo "Parsed arxiv_id: $ARXIV_ID"

      - name: Validate arxiv_id
        if: steps.parse.outputs.arxiv_id == ''
        run: |
          echo "Could not parse arxiv_id from issue."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Unmark paper
        run: |
          python scripts/unmark_paper.py --arxiv_id "${{ steps.parse.outputs.arxiv_id }}"

      - name: Commit changes
        run: |
          git config user.name "research-pipeline-bot"
          git config user.email "bot@research-pipeline.local"
          git add data/papers_index.json _papers/ _podcasts/ _data/summaries/ assets/audio/
          if ! git diff --quiet --cached; then
            git commit -m "unmark ${{ steps.parse.outputs.arxiv_id }} from favorites [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const id = '${{ steps.parse.outputs.arxiv_id }}';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `Paper \`${id}\` has been removed from favorites. The favorites page will update on the next site rebuild.`
            });

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
